<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Enneagram Self-Reflection Test</title>
  <link rel="stylesheet" href="https://use.typekit.net/ddt8web.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="landing" id="landing">
    <p class="landing-text">Knowing yourself is power</p>
    <button type="button" class="btn btn-start" id="start-btn">Start test</button>
  </section>

  <div class="container test-content" id="test-content" hidden>
    <header class="header">
      <h1 class="title">Enneagram Self-Reflection Test</h1>
      <p class="subtitle">Discover your core personality type through thoughtful reflection</p>
      <p class="instruction">Answer based on your most typical pattern, not your best day.</p>
    </header>

    <section class="progress-section">
      <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill"></div>
      </div>
      <p class="progress-text">Section 1 of 9</p>
    </section>

    <main class="question-container" id="question-container">
      <!-- Questions injected by script.js -->
    </main>

    <nav class="navigation">
      <button type="button" class="btn btn-back" id="back-btn">Back</button>
      <button type="button" class="btn btn-next" id="next-btn" disabled>Next</button>
    </nav>

    <section class="results-container" id="results-container" hidden>
      <!-- Results injected by script.js -->
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
